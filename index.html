<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Logic Box Solver - Puzzle Game</title>
    <style>
        :root { --bg: #2c3e50; --wall: #34495e; --floor: #ecf0f1; --box: #f39c12; --target: #2ecc71; --player: #3498db; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        .stats { margin-bottom: 10px; font-size: 1.2rem; }
        #game-board { display: grid; background: var(--wall); border: 4px solid var(--wall); gap: 1px; }
        .tile { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 2rem; background: var(--floor); }
        .wall { background: var(--wall); }
        .target { background: #d5f5e3; position: relative; }
        .target::after { content: '🎯'; font-size: 1.2rem; opacity: 0.5; }
        .box { background: var(--box); border-radius: 5px; z-index: 1; }
        .player { background: var(--player); border-radius: 50%; z-index: 2; transition: all 0.1s; }
        .box-on-target { background: #27ae60; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); }
        .controls { margin-top: 20px; color: #bdc3c7; text-align: center; }
        .btn { padding: 10px 20px; background: #e74c3c; color: white; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>

    <h1>Logic Box Solver</h1>
    <div class="stats">Level: <span id="level">1</span> | Moves: <span id="moves">0</span></div>
    
    <div id="game-board"></div>

    <div class="controls">
        <p>十字キー または WASD で移動</p>
        <button class="btn" onclick="resetLevel()">リセット (R)</button>
        <p id="message"></p>
    </div>

<script>
// マップ記号: #=壁, .=床, @=プレイヤー, $=荷物, *=目的地, +=目的地上のプレイヤー, &=目的地上の荷物
const levels = [
    [
        "  ##### ",
        "###   # ",
        "#.@$  # ",
        "### $.# ",
        "#.# $ # ",
        "# # . # ",
        "#   ### ",
        "#####   "
    ],
    [
        " #####  ",
        " #   #  ",
        " #$  #  ",
        "### $## ",
        "#  $  # ",
        "# . . # ",
        "####### "
    ],
    [
        "    #####          ",
        "    #   #          ",
        "    #$  #          ",
        "  ### $ ##         ",
        "  #  $ $ #         ",
        "### # ## #   ######",
        "#   # ## #####  ..#",
        "# $  $          ..#",
        "##### ### #@##  ..#",
        "    #     #########",
        "    #######        "
    ]
];

let currentLevel = 0;
let moves = 0;
let map = [];
let playerPos = { r: 0, c: 0 };

function initLevel() {
    moves = 0;
    document.getElementById('moves').innerText = moves;
    document.getElementById('level').innerText = currentLevel + 1;
    document.getElementById('message').innerText = "";
    
    // 文字列配列を2次元配列に変換
    map = levels[currentLevel].map(row => row.split(''));
    
    // プレイヤー位置の特定
    for(let r=0; r<map.length; r++) {
        for(let c=0; c<map[r].length; c++) {
            if(map[r][c] === '@' || map[r][c] === '+') {
                playerPos = { r, c };
            }
        }
    }
    draw();
}

function draw() {
    const board = document.getElementById('game-board');
    board.innerHTML = '';
    board.style.gridTemplateColumns = `repeat(${map[0].length}, 50px)`;

    for(let r=0; r<map.length; r++) {
        for(let c=0; c<map[r].length; c++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            const char = map[r][c];
            
            if(char === '#') tile.classList.add('wall');
            if(char === '.' || char === '*' || char === '&' || char === '+') tile.classList.add('target');
            if(char === '$' || char === '&') {
                tile.innerText = '📦';
                tile.classList.add('box');
                if(char === '&') tile.classList.add('box-on-target');
            }
            if(char === '@' || char === '+') {
                tile.innerText = '👤';
                tile.classList.add('player');
            }
            board.appendChild(tile);
        }
    }
    checkWin();
}

function move(dr, dc) {
    const nr = playerPos.r + dr;
    const nc = playerPos.c + dc;
    const target = map[nr][nc];

    // 壁なら動けない
    if(target === '#') return;

    // 荷物がある場合
    if(target === '$' || target === '&') {
        const nnr = nr + dr;
        const nnc = nc + dc;
        const nextTarget = map[nnr][nnc];

        // 荷物の先が床か目的地なら押せる
        if(nextTarget === ' ' || nextTarget === '.') {
            // 荷物を移動
            map[nnr][nnc] = nextTarget === '.' ? '&' : '$';
            // 元の場所を更新
            map[nr][nc] = target === '&' ? '.' : ' ';
        } else {
            return; // 押せない
        }
    }

    // プレイヤーの移動
    const currentChar = map[playerPos.r][playerPos.c];
    map[playerPos.r][playerPos.c] = (currentChar === '+') ? '.' : ' ';
    
    playerPos.r = nr;
    playerPos.c = nc;
    map[nr][nc] = (map[nr][nc] === '.' || map[nr][nc] === '&') ? '+' : '@';

    moves++;
    document.getElementById('moves').innerText = moves;
    draw();
}

function checkWin() {
    // マップ内に $ (目的地にいない荷物) がなくなればクリア
    const isWin = !map.some(row => row.includes('$'));
    if(isWin) {
        document.getElementById('message').innerText = "Level Clear! Press Space for Next.";
    }
}

function resetLevel() { initLevel(); }

window.addEventListener('keydown', e => {
    switch(e.key) {
        case 'ArrowUp': case 'w': move(-1, 0); break;
        case 'ArrowDown': case 's': move(1, 0); break;
        case 'ArrowLeft': case 'a': move(0, -1); break;
        case 'ArrowRight': case 'd': move(0, 1); break;
        case 'r': resetLevel(); break;
        case ' ': 
            if(!map.some(row => row.includes('$'))) {
                currentLevel = (currentLevel + 1) % levels.length;
                initLevel();
            }
            break;
    }
});

initLevel();
</script>
</body>
</html>
