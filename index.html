<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growing Up Simulator</title>
    <style>
        :root {
            --primary: #ff7675;
            --bg: #f5f6fa;
            --card: #ffffff;
            --text: #2d3436;
        }
        body { font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #game-container { background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        .status-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; background: #fff5f5; padding: 15px; border-radius: 10px; }
        .status-item { font-size: 0.9rem; font-weight: bold; }
        .status-val { color: var(--primary); display: block; font-size: 1.2rem; }
        #scene-image { font-size: 5rem; margin: 20px 0; }
        #description { font-size: 1.1rem; margin-bottom: 30px; line-height: 1.6; min-height: 80px; }
        .choice-btn { display: block; width: 100%; padding: 15px; margin-bottom: 10px; border: 2px solid var(--primary); background: white; color: var(--primary); border-radius: 10px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: 0.2s; }
        .choice-btn:hover { background: var(--primary); color: white; }
        #restart-btn { display: none; background: #636e72; color: white; border: none; }
    </style>
</head>
<body>

<div id="game-container">
    <h2 id="age-display">0歳：誕生</h2>
    
    <div class="status-grid">
        <div class="status-item">知力<span id="stat-int" class="status-val">10</span></div>
        <div class="status-item">体力<span id="stat-str" class="status-val">10</span></div>
        <div class="status-item">感性<span id="stat-emot" class="status-val">10</span></div>
    </div>

    <div id="scene-image">👶</div>
    <div id="description">元気な赤ちゃんが生まれました。どんなふうに育てますか？</div>

    <div id="choices-area">
        </div>

    <button id="restart-btn" class="choice-btn" onclick="location.reload()">もう一度育てる</button>
</div>

<script>
// ゲームデータ
const storyData = [
    {
        age: "3歳：初めての習い事",
        img: "🎨",
        desc: "子供が何かに興味を持ち始めました。何をさせますか？",
        choices: [
            { text: "絵画教室に通わせる", stats: { int: 5, str: 0, emot: 15 }, next: 1 },
            { text: "体操教室に通わせる", stats: { int: 0, str: 15, emot: 5 }, next: 1 },
            { text: "家で自由に遊ばせる", stats: { int: 5, str: 5, emot: 5 }, next: 1 }
        ]
    },
    {
        age: "7歳：小学校入学",
        img: "🏫",
        desc: "放課後の過ごし方はどうしましょう？",
        choices: [
            { text: "塾で猛勉強させる", stats: { int: 20, str: -5, emot: 0 }, next: 2 },
            { text: "外で暗くなるまで遊ばせる", stats: { int: -5, str: 20, emot: 10 }, next: 2 },
            { text: "図書館へ一緒に行く", stats: { int: 10, str: 0, emot: 15 }, next: 2 }
        ]
    },
    {
        age: "15歳：進路相談",
        img: "✍️",
        desc: "将来について悩んでいるようです。アドバイスは？",
        choices: [
            { text: "安定した公務員を勧める", stats: { int: 15, str: 0, emot: -5 }, next: 3 },
            { text: "スポーツ推薦で道を開かせる", stats: { int: 0, str: 20, emot: 5 }, next: 3 },
            { text: "本人の好きなようにさせる", stats: { int: 5, str: 5, emot: 20 }, next: 3 }
        ]
    }
];

// ステータス
let stats = { int: 10, str: 10, emot: 10 };
let currentStep = 0;

function updateUI() {
    document.getElementById('stat-int').innerText = stats.int;
    document.getElementById('stat-str').innerText = stats.str;
    document.getElementById('stat-emot').innerText = stats.emot;
}

function renderScene(step) {
    if (step >= storyData.length) {
        showEnding();
        return;
    }

    const data = storyData[step];
    document.getElementById('age-display').innerText = data.age;
    document.getElementById('scene-image').innerText = data.img;
    document.getElementById('description').innerText = data.desc;
    
    const choicesArea = document.getElementById('choices-area');
    choicesArea.innerHTML = '';

    data.choices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerText = choice.text;
        btn.onclick = () => {
            stats.int += choice.stats.int;
            stats.str += choice.stats.str;
            stats.emot += choice.stats.emot;
            updateUI();
            renderScene(choice.next);
        };
        choicesArea.appendChild(btn);
    });
}

function showEnding() {
    document.getElementById('age-display').innerText = "22歳：旅立ち";
    let job = "";
    let img = "";

    // 簡易的なエンディング判定ロジック
    if (stats.int >= 40) {
        job = "博識な大学教授になりました。";
        img = "👨‍🏫";
    } else if (stats.str >= 40) {
        job = "世界的なアスリートになりました。";
        img = "🏃";
    } else if (stats.emot >= 40) {
        job = "心優しい芸術家になりました。";
        img = "🎨";
    } else {
        job = "平凡ながら幸せな社会人になりました。";
        img = "👨‍💼";
    }

    document.getElementById('scene-image').innerText = img;
    document.getElementById('description').innerText = `子供は立派に成長しました！\n\n最終結果：${job}`;
    document.getElementById('choices-area').innerHTML = '';
    document.getElementById('restart-btn').style.display = 'block';
}

// 初期実行
renderScene(0);
</script>

</body>
</html>
