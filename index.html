<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undertale-like Battle</title>
    <style>
        /* 全体の設定 */
        :root {
            --bg-color: #000;
            --text-color: #fff;
            --border-color: #666;
            --heart-color: #f00;
            --box-color: #333;
            --option-color: #4CAF50; /* 緑 */
            --font-pixel: 'Press Start 2P', cursive;
        }

        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            font-family: var(--font-pixel);
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            flex-direction: column;
            user-select: none;
            text-align: center;
            font-size: 14px;
        }

        /* ゲームコンテナ */
        .game-container {
            width: 90%;
            max-width: 600px;
            background-color: var(--box-color);
            border: 4px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.5);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        /* メッセージエリア */
        .message-box {
            background-color: #222;
            border: 2px solid var(--border-color);
            padding: 10px;
            min-height: 60px;
            width: 90%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 0.9em;
        }

        /* バトルエリア (弾幕避け) */
        .battle-area {
            width: 250px;
            height: 180px;
            background-color: var(--bg-color);
            border: 3px solid var(--border-color);
            position: relative;
            overflow: hidden;
            margin: 20px auto;
        }

        /* プレイヤーのハート */
        .player-heart {
            position: absolute;
            width: 16px;
            height: 16px;
            background-color: var(--heart-color);
            transform: rotate(-45deg);
            top: calc(50% - 8px);
            left: calc(50% - 8px);
        }
        .player-heart::before, .player-heart::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background-color: var(--heart-color);
            border-radius: 50%;
        }
        .player-heart::before {
            top: -8px;
            left: 0;
        }
        .player-heart::after {
            top: 0;
            left: 8px;
        }

        /* 敵の弾幕 */
        .bullet {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #fff;
            border-radius: 50%;
            animation: bulletFall 2s linear forwards;
        }

        @keyframes bulletFall {
            from { transform: translateY(-20px); opacity: 1; }
            to { transform: translateY(180px); opacity: 0; }
        }

        /* HPゲージ */
        .hp-bar-container {
            width: 90%;
            background-color: #444;
            border: 2px solid var(--border-color);
            height: 15px;
            margin-top: 10px;
            position: relative;
        }
        .hp-bar {
            height: 100%;
            background-color: var(--heart-color);
            width: 100%; /* 初期値 */
            transition: width 0.3s ease;
        }
        .hp-text {
            position: absolute;
            top: 50%;
            left: 10px;
            transform: translateY(-50%);
            color: #eee;
            font-size: 0.8em;
        }

        /* コマンドメニュー */
        .command-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 90%;
            margin-top: 20px;
        }

        .command-button {
            background-color: var(--box-color);
            border: 2px solid var(--border-color);
            color: var(--text-color);
            padding: 10px 15px;
            font-family: var(--font-pixel);
            font-size: 0.8em;
            cursor: pointer;
            transition: background-color 0.1s ease;
            box-shadow: 3px 3px 0px var(--border-color);
        }
        .command-button:hover {
            background-color: #555;
            box-shadow: 5px 5px 0px var(--border-color);
        }
        .command-button:disabled {
            background-color: #333;
            color: #888;
            cursor: not-allowed;
            box-shadow: 2px 2px 0px var(--border-color);
        }

        /* モンスター表示 */
        .monster-sprite {
            width: 80px;
            height: 80px;
            background-color: #888; /* モンスターの仮色 */
            border: 2px solid #555;
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.8em;
            color: #fff;
        }

        /* 勝利/敗北メッセージ */
        .game-over-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 2em;
            z-index: 100;
            display: none; /* 初期は非表示 */
        }
        .game-over-screen button {
            background-color: var(--main-color);
            border: 2px solid var(--border-color);
            color: var(--text-color);
            padding: 15px 30px;
            font-family: var(--font-pixel);
            font-size: 0.8em;
            cursor: pointer;
            margin-top: 20px;
        }

        /* モバイル対応 */
        @media (max-width: 600px) {
            body {
                font-size: 12px;
            }
            .game-container {
                padding: 10px;
            }
            .battle-area {
                width: 200px;
                height: 150px;
            }
            .command-menu {
                grid-template-columns: 1fr;
            }
            .monster-sprite {
                width: 60px;
                height: 60px;
                top: 10px;
                right: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="monster-sprite">敵</div>
        <div id="messageBox" class="message-box">
            奇妙なモンスターが現れた！
        </div>

        <div class="hp-bar-container">
            <div id="hpBar" class="hp-bar"></div>
            <span class="hp-text">HP: <span id="currentHp">20</span>/<span id="maxHp">20</span></span>
        </div>

        <div id="battleArea" class="battle-area">
            <div id="playerHeart" class="player-heart"></div>
        </div>

        <div class="command-menu">
            <button id="attackButton" class="command-button">たたかう</button>
            <button id="actButton" class="command-button">こうどう</button>
            <button id="itemButton" class="command-button">アイテム</button>
            <button id="mercyButton" class="command-button">みのがす</button>
        </div>
    </div>

    <div id="gameOverScreen" class="game-over-screen">
        <p id="gameOverText"></p>
        <button onclick="location.reload()">もういちど</button>
    </div>

    <script>
        const messageBox = document.getElementById('messageBox');
        const battleArea = document.getElementById('battleArea');
        const playerHeart = document.getElementById('playerHeart');
        const hpBar = document.getElementById('hpBar');
        const currentHpDisplay = document.getElementById('currentHp');
        const maxHpDisplay = document.getElementById('maxHp');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const gameOverText = document.getElementById('gameOverText');

        const attackButton = document.getElementById('attackButton');
        const actButton = document.getElementById('actButton');
        const itemButton = document.getElementById('itemButton');
        const mercyButton = document.getElementById('mercyButton');

        let playerHp = 20;
        const maxPlayerHp = 20;
        let monsterHp = 10; // モンスターのHP (倒すことも可能に)
        let monsterMercy = 0; // モンスターを見逃すためのポイント
        let gameActive = true;
        let bulletInterval;

        const battleAreaRect = battleArea.getBoundingClientRect();
        let heartX = battleAreaRect.width / 2 - 8;
        let heartY = battleAreaRect.height / 2 - 8;

        playerHeart.style.left = heartX + 'px';
        playerHeart.style.top = heartY + 'px';

        // HPバーの更新
        function updateHpDisplay() {
            hpBar.style.width = (playerHp / maxPlayerHp) * 100 + '%';
            currentHpDisplay.textContent = playerHp;
        }

        // ゲームオーバー処理
        function gameOver(message, isVictory = false) {
            gameActive = false;
            clearInterval(bulletInterval);
            document.removeEventListener('keydown', handleKeyPress);
            gameOverText.textContent = message;
            gameOverScreen.style.display = 'flex';

            // コマンドボタンを無効化
            attackButton.disabled = true;
            actButton.disabled = true;
            itemButton.disabled = true;
            mercyButton.disabled = true;
        }

        // 弾幕生成
        function spawnBullet() {
            if (!gameActive) return;

            const bullet = document.createElement('div');
            bullet.classList.add('bullet');
            // 弾の生成位置をランダムにする
            bullet.style.left = Math.random() * (battleAreaRect.width - 8) + 'px';
            battleArea.appendChild(bullet);

            bullet.addEventListener('animationend', () => {
                bullet.remove();
            });

            // 弾とハートの当たり判定
            const checkCollision = setInterval(() => {
                if (!gameActive) {
                    clearInterval(checkCollision);
                    return;
                }
                const bulletRect = bullet.getBoundingClientRect();
                const heartRect = playerHeart.getBoundingClientRect();

                // 弾がハートの領域内にあるか
                if (
                    bulletRect.left < heartRect.right &&
                    bulletRect.right > heartRect.left &&
                    bulletRect.top < heartRect.bottom &&
                    bulletRect.bottom > heartRect.top
                ) {
                    playerHp--;
                    updateHpDisplay();
                    bullet.remove(); // 弾が当たったら消す
                    clearInterval(checkCollision);

                    if (playerHp <= 0) {
                        gameOver('ゲームオーバー...');
                    }
                }
            }, 50); // 50msごとに当たり判定をチェック
        }

        // ハートの移動 (キーボード操作)
        const heartSpeed = 5;
        const handleKeyPress = (e) => {
            if (!gameActive) return;

            const battleAreaBounds = battleArea.getBoundingClientRect();
            const heartBounds = playerHeart.getBoundingClientRect();

            switch (e.key) {
                case 'ArrowUp':
                    heartY = Math.max(0, heartY - heartSpeed);
                    break;
                case 'ArrowDown':
                    heartY = Math.min(battleAreaBounds.height - heartBounds.height, heartY + heartSpeed);
                    break;
                case 'ArrowLeft':
                    heartX = Math.max(0, heartX - heartSpeed);
                    break;
                case 'ArrowRight':
                    heartX = Math.min(battleAreaBounds.width - heartBounds.width, heartX + heartSpeed);
                    break;
            }
            playerHeart.style.left = heartX + 'px';
            playerHeart.style.top = heartY + 'px';
        };
        document.addEventListener('keydown', handleKeyPress);

        // コマンドボタンのイベントリスナー
        attackButton.addEventListener('click', () => {
            if (!gameActive) return;
            messageBox.textContent = 'プレイヤーはモンスターにダメージを与えた！';
            monsterHp -= 3; // 仮のダメージ
            if (monsterHp <= 0) {
                gameOver('モンスターを倒した！', true);
            }
        });

        actButton.addEventListener('click', () => {
            if (!gameActive) return;
            // 行動選択の例
            messageBox.textContent = 'プレイヤーはモンスターに話しかけた。モンスターは少し困惑している。';
            monsterMercy += 1; // 見逃すためのポイントを増やす
        });

        itemButton.addEventListener('click', () => {
            if (!gameActive) return;
            if (playerHp < maxPlayerHp) {
                messageBox.textContent = 'プレイヤーは回復アイテムを使った。HPが回復した！';
                playerHp = Math.min(maxPlayerHp, playerHp + 5); // 仮の回復量
                updateHpDisplay();
            } else {
                messageBox.textContent = 'HPは満タンだ。';
            }
        });

        mercyButton.addEventListener('click', () => {
            if (!gameActive) return;
            if (monsterMercy >= 3) { // 3回行動したら見逃せる
                gameOver('モンスターを見逃した！平和な解決だ。', true);
            } else {
                messageBox.textContent = 'まだ見逃すことができないようだ...。';
            }
        });

        // ゲーム開始
        updateHpDisplay();
        bulletInterval = setInterval(spawnBullet, 500); // 0.5秒ごとに弾を生成

        // 初期メッセージ
        setTimeout(() => {
            messageBox.textContent = 'モンスターはあなたを見ている。';
        }, 1500);
    </script>
</body>
</html>
